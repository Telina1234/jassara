<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victory Voice - Test navigateur</title>
  <link rel="icon" href="victory_voice_logo.png">
  <style>
    :root {
      --navy: #020b24;
      --navy-2: #071841;
      --blue: #1d6dff;
      --cyan: #54d9ff;
      --surface: #f7faff;
      --card-bg: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --line: #b7d3ff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.dark {
      --surface: #071226;
      --card-bg: #0d1b33;
      --text: #f8fafc;
      --muted: #a8b5c8;
      --line: #244876;
      background:
        radial-gradient(circle at 82% 18%, rgba(84, 217, 255, .2), transparent 22rem),
        linear-gradient(135deg, #020b24, #071226 48%, #0d1b33);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 82% 18%, rgba(84, 217, 255, .22), transparent 22rem),
        linear-gradient(135deg, #edf6ff, #f8fbff 44%, #e7f1ff);
    }

    .phone-shell {
      width: min(430px, 100%);
      height: 100dvh;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--surface);
      box-shadow: 0 0 50px rgba(2, 11, 36, .24);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-shell::before {
      content: "";
      position: absolute;
      inset: 84px -78px -56px;
      background: url("victory_voice_logo.png") center center / min(150%, 680px) auto no-repeat;
      opacity: .075;
      pointer-events: none;
      z-index: 0;
    }

    .topbar,
    main,
    .drawer,
    .zoom-control {
      position: relative;
    }

    main,
    .drawer,
    .zoom-control {
      z-index: 1;
    }

    .topbar {
      height: 82px;
      flex: 0 0 82px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      color: white;
      background: linear-gradient(135deg, var(--navy), var(--navy-2));
      position: sticky;
      top: 0;
      z-index: 20;
      overflow: hidden;
    }

    .topbar::before,
    .hero::before {
      content: "";
      position: absolute;
      inset: -20% -15%;
      background:
        radial-gradient(circle, rgba(84, 217, 255, .9) 0 2px, transparent 3px) 24px 30px / 70px 56px,
        linear-gradient(130deg, transparent 18%, rgba(29, 109, 255, .35) 38%, rgba(84, 217, 255, .52) 46%, transparent 62%);
      opacity: .62;
      transform: rotate(-8deg);
    }

    .menu-btn,
    .icon-btn {
      border: 0;
      border-radius: 16px;
      color: white;
      background: rgba(255, 255, 255, .1);
      width: 48px;
      height: 48px;
      font-size: 26px;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      flex: 1;
    }

    main {
      flex: 1;
      min-height: 0;
      padding: 18px 16px 30px;
      overflow-y: auto;
    }

    main.detail-screen {
      height: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 8px 16px 12px;
      overflow: hidden;
    }

    .hero {
      min-height: 132px;
      border-radius: 22px;
      padding: 24px;
      color: white;
      background: linear-gradient(135deg, var(--navy), #04225b);
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 38px rgba(2, 11, 36, .22);
      margin-bottom: 24px;
    }

    .hero.clean {
      min-height: 132px;
      margin-bottom: 16px;
    }

    .hero h2,
    .hero p {
      position: relative;
      z-index: 1;
    }

    .hero h2 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
    }

    .hero p {
      margin: 12px 0 0;
      color: #cfe7ff;
      line-height: 1.5;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0 14px;
    }

    .title-row h2 {
      margin: 0;
      flex: 1;
      color: var(--text);
      font-size: 24px;
    }

    .search {
      width: 100%;
      height: 56px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0 16px;
      margin-bottom: 16px;
      color: var(--text);
      background: var(--card-bg);
      font: inherit;
      outline: 0;
    }

    .search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(29, 109, 255, .12);
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: var(--card-bg);
      box-shadow: 0 8px 22px rgba(15, 23, 42, .06);
      margin-bottom: 14px;
      cursor: pointer;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card h3 {
      margin: 0;
      flex: 1;
      font-size: 21px;
    }

    .card p {
      margin: 8px 0 0;
      color: var(--blue);
      font-weight: 700;
    }

    .star {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-size: 25px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 999px;
    }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(0, 0, 0, .46);
    }

    .drawer.open { display: block; }

    .drawer-panel {
      width: min(340px, 84vw);
      height: 100%;
      background: var(--card-bg);
      border-radius: 0 28px 28px 0;
      overflow: hidden;
      box-shadow: 18px 0 42px rgba(0, 0, 0, .22);
    }

    .drawer-header {
      min-height: 168px;
      padding: 32px 28px;
      color: white;
      background: linear-gradient(135deg, var(--navy), #04225b);
      position: relative;
      overflow: hidden;
    }

    .drawer-header::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: linear-gradient(130deg, transparent 14%, rgba(84, 217, 255, .44) 42%, transparent 64%);
      transform: rotate(-11deg);
    }

    .drawer-header h2,
    .drawer-header p { position: relative; margin: 0; }

    .drawer-header h2 { font-size: 34px; }

    .drawer-header p {
      max-width: 270px;
      color: #d9ecff;
      font-family: "Bradley Hand ITC", "Segoe Print", cursive;
      font-size: 16px;
      font-style: normal;
      font-weight: 600;
      line-height: 1.38;
      margin-top: 12px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .28);
    }

    .drawer-header .verse-ref {
      display: block;
      margin-top: 5px;
      text-align: right;
      font-size: 15px;
    }

    .nav-item {
      width: 100%;
      min-height: 64px;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      column-gap: 14px;
      border: 0;
      margin: 6px 14px;
      width: calc(100% - 28px);
      border-radius: 18px;
      padding: 0 18px;
      color: var(--text);
      background: var(--card-bg);
      font: inherit;
      font-weight: 800;
      text-align: left;
      cursor: pointer;
    }

    .nav-item span {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--blue);
      background: rgba(29, 109, 255, .10);
      font-size: 24px;
      text-align: center;
      line-height: 1;
    }

    .nav-item b {
      line-height: 1;
      display: block;
    }

    .nav-item:hover,
    .nav-item:focus-visible {
      background: rgba(29, 109, 255, .11);
      outline: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 16px 0;
    }

    .btn {
      min-height: 52px;
      border: 1px solid var(--blue);
      border-radius: 18px;
      padding: 0 18px;
      color: white;
      background: var(--blue);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .btn.small {
      min-height: 38px;
      width: auto;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 14px;
    }

    .btn.secondary {
      color: var(--blue);
      background: var(--card-bg);
    }

    .form {
      display: grid;
      gap: 14px;
    }

    textarea.search {
      height: min(46vh, 380px);
      padding-top: 16px;
      resize: vertical;
      line-height: 1.45;
    }

    .note,
    .lyrics {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      color: var(--muted);
      background: var(--card-bg);
      line-height: 1.55;
    }

    .lyrics {
      color: var(--text);
      border: 0;
      border-radius: 0;
      background: transparent;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      font-size: var(--lyrics-size, 19px);
      white-space: pre-wrap;
    }

    .detail-screen .title-row {
      margin: 0 0 4px;
    }

    .detail-screen .title-row h2 {
      font-size: 22px;
    }

    .detail-screen .song-artist {
      margin: 0 0 8px;
      padding: 10px 14px;
    }

    .detail-screen .actions {
      margin: 0 0 8px;
      gap: 8px;
    }

    .setting-list {
      display: grid;
      gap: 12px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      color: var(--text);
      text-align: left;
      font: inherit;
      cursor: pointer;
      border-radius: 18px;
      padding: 16px;
      background: var(--card-bg);
      box-shadow: 0 8px 22px rgba(15, 23, 42, .05);
    }

    .setting-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--blue);
      background: #eaf2ff;
      font-weight: 900;
    }

    .setting-text {
      flex: 1;
    }

    .setting-text h3 {
      margin: 0;
      font-size: 17px;
    }

    .setting-text p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .segmented {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
      background: rgba(29, 109, 255, .08);
    }

    .segmented button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      background: transparent;
      font-weight: 800;
      cursor: pointer;
    }

    .segmented button.active {
      color: white;
      background: var(--blue);
    }

    .zoom-control {
      position: fixed;
      bottom: 18px;
      z-index: 70;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, .42);
      border-radius: 999px;
      color: white;
      background: rgba(29, 109, 255, .34);
      box-shadow: 0 10px 24px rgba(2, 11, 36, .22);
      backdrop-filter: blur(12px);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      display: none;
    }

    .zoom-control.show { display: block; }

    #zoomOut { left: max(16px, calc(50% - 199px)); }
    #zoomIn { right: max(16px, calc(50% - 199px)); }

    .align-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .align-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(29, 109, 255, .35);
      border-radius: 12px;
      color: var(--blue);
      background: rgba(29, 109, 255, .08);
      font-weight: 900;
      cursor: pointer;
    }

    .align-btn.active {
      color: white;
      background: var(--blue);
    }

    .admin-list {
      margin-top: 22px;
    }

    .admin-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .danger {
      border-color: #ef4444;
      color: #ef4444;
      background: transparent;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      min-width: 240px;
      max-width: calc(100% - 32px);
      border-radius: 999px;
      padding: 13px 18px;
      color: white;
      background: rgba(2, 11, 36, .94);
      text-align: center;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 60;
    }

    .toast.show { opacity: 1; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(2, 11, 36, .58);
    }

    .modal.open { display: grid; }

    .modal-card {
      width: min(390px, 100%);
      border-radius: 22px;
      padding: 20px;
      background: var(--card-bg);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
    }

    .modal-card h2 {
      margin: 0 0 14px;
      color: var(--navy);
      font-size: 22px;
    }

    body.dark .modal-card h2 {
      color: var(--text);
    }

    body.dark .setting-icon {
      color: #dbeafe;
      background: #17345e;
    }

    .about-note {
      min-height: calc(100vh - 150px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      white-space: pre-line;
    }

    @media (min-width: 900px) {
      body {
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .phone-shell {
        height: min(900px, calc(100vh - 56px));
        min-height: 0;
        border-radius: 34px;
      }

      .drawer {
        position: absolute;
      }
    }
  </style>
</head>

        <div class="actions">
          <button class="btn small" id="modalChangePass">Changer</button>
          <button class="btn small secondary" id="modalClose">Fermer</button>
        </div>
      </div>
    </div>
  </div>

      <div id="adminListBody"></div>
      <div class="actions">
        <button class="btn small secondary" id="adminListClose">Fermer</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <input id="importFiles" type="file" accept="application/json,.json" multiple hidden>

        adminSecurity: "Admin security",
        adminSecuritySub: "Click to change the admin password.",
        oldPass: "Old password",
        newPass: "New password",
        change: "Change",
        close: "Close",
        passChanged: "Password changed.",
        oldWrong: "Old password is wrong.",
        passShort: "Use at least 4 characters.",
        french: "Français",
        english: "English",
        languageFr: "Langue: français.",
        languageEn: "Language: English.",
        addedFav: "Added to favorites.",
        removedFav: "Removed from favorites.",
        themeDark: "Dark mode",
        themeLight: "Light mode",
        alignLeft: "Left",
        alignCenter: "Center",
        alignRight: "Right",
        edit: "Edit",
        delete: "Delete",
        update: "Update",
        cancel: "Cancel",
        adminList: "Edit or delete a song",
        deleteConfirm: "Delete this song?",
        importData: "Import data",
        importDataSub: "Choose one or more Victory Voice JSON files.",
        exportData: "Export data",
        exportDataSub: "Create one file containing all songs and favorites.",
        exportDone: "Export finished.",
        importDone: "Imported songs:",
        transferError: "Transfer failed.",
        aboutText: "APK version 1.0\nCopyright by Telina Randrenanja"
      }
    };

    const store = {
      get songs() {
        const saved = localStorage.getItem("tononkira_songs");
        if (saved) return JSON.parse(saved);
        const songs = seedSongs.map((song, index) => ({
          id: Date.now() + index,
          title: song[0],
          artist: song[1],
          lyrics: song[2]
        }));
        localStorage.setItem("tononkira_songs", JSON.stringify(songs));
        return songs;
      },
      set songs(value) {
        localStorage.setItem("tononkira_songs", JSON.stringify(value));
      },
      get favorites() {
        return JSON.parse(localStorage.getItem("tononkira_favorites") || "[]");
      },
      set favorites(value) {
        localStorage.setItem("tononkira_favorites", JSON.stringify(value));
      },
      get password() {
        return localStorage.getItem("tononkira_admin_password") || "1234";
      },
      set password(value) {
        localStorage.setItem("tononkira_admin_password", value);
      }
    };

    const app = document.querySelector("#app");
    const title = document.querySelector("#pageTitle");
    const drawer = document.querySelector("#drawer");
    const toast = document.querySelector("#toast");
    const zoomOut = document.querySelector("#zoomOut");
    const zoomIn = document.querySelector("#zoomIn");
    const passwordModal = document.querySelector("#passwordModal");
    const adminListModal = document.querySelector("#adminListModal");
    const adminListBody = document.querySelector("#adminListBody");
    const adminListTitle = document.querySelector("#adminListTitle");
    const importFiles = document.querySelector("#importFiles");
    let adminUnlocked = false;
    let currentRoute = { name: "home", data: null };
    let lyricsSize = Number(localStorage.getItem("tononkira_lyrics_size") || 19);
    let lyricsAlign = localStorage.getItem("victory_voice_lyrics_align") || "center";
    let editingSongId = null;

    function lang() {
      return localStorage.getItem("tononkira_language") || "fr";
    }

    function L(key) {
      return i18n[lang()][key] || i18n.fr[key] || key;
    }

    function sortedSongs(songs = store.songs) {
      return [...songs].sort((a, b) => a.title.localeCompare(b.title, lang(), { sensitivity: "base" }));
    }

    function updateStaticText() {
      document.querySelectorAll("[data-i18n]").forEach(node => {
        node.textContent = L(node.dataset.i18n);
      });
      document.querySelector("#topSearch").setAttribute("aria-label", L("search"));
      document.querySelector("#themeToggle").setAttribute("aria-label", document.body.classList.contains("dark") ? L("themeLight") : L("themeDark"));
      document.querySelector("#themeToggle").textContent = document.body.classList.contains("dark") ? "☼" : "◐";
      document.querySelector("#modalOldPass").placeholder = L("oldPass");
      document.querySelector("#modalNewPass").placeholder = L("newPass");
      document.querySelector("#modalChangePass").textContent = L("change");
      document.querySelector("#modalClose").textContent = L("close");
      adminListTitle.textContent = L("adminList");
      document.querySelector("#adminListClose").textContent = L("close");
    }

    function setView(name, data, push = true) {
      drawer.classList.remove("open");
      currentRoute = { name, data };
      if (push) {
        history.pushState({ name, data }, "", "#" + name);
      }
      const views = { home, search, artists, favorites, admin, settings, transfer, about, detail, artistSongs };
      views[name](data);
    }

    function page(name, html) {
      title.textContent = name;
      app.innerHTML = html;
      app.className = "";
      zoomOut.classList.remove("show");
      zoomIn.classList.remove("show");
      updateStaticText();
    }

    function hero(head = "", body = "") {
      const clean = !head && !body;
      return `<section class="hero${clean ? " clean" : ""}">${clean ? "" : `<h2>${escapeHtml(head)}</h2><p>${escapeHtml(body)}</p>`}</section>`;
    }

    function section(text) {
      return `<div class="title-row"><h2>${escapeHtml(text)}</h2></div>`;
    }

    function songCards(songs) {
      if (!songs.length) return `<div class="note">${escapeHtml(L("noSongs"))}</div>`;
      const fav = store.favorites;
      return songs.map(song => `
        <article class="card" data-song="${song.id}">
          <div class="card-head">
            <h3>${escapeHtml(song.title)}</h3>
            <button class="star" data-fav="${song.id}" aria-label="Favori">${fav.includes(song.id) ? "★" : "☆"}</button>
          </div>
          <p>${escapeHtml(song.artist)}</p>
        </article>
      `).join("");
    }

    function adminSongCards() {
      const songs = sortedSongs();
      if (!songs.length) return `<div class="note">${escapeHtml(L("noSongs"))}</div>`;
      return songs.map(song => `
        <article class="card">
          <h3>${escapeHtml(song.title)}</h3>
          <p>${escapeHtml(song.artist)}</p>
          <div class="admin-card-actions">
            <button class="btn small secondary" data-edit="${song.id}" title="${escapeAttr(L("edit"))}">✎</button>
            <button class="btn small danger" data-delete="${song.id}" title="${escapeAttr(L("delete"))}">🗑</button>
          </div>
        </article>
      `).join("");
    }

    function bindSongCards() {
      document.querySelectorAll("[data-song]").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("[data-fav]")) return;
          const song = store.songs.find(item => item.id === Number(card.dataset.song));
          setView("detail", song);
        });
      });
      document.querySelectorAll("[data-fav]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          toggleFavorite(Number(button.dataset.fav));
        });
      });
    }

    function home() {
      page(L("appTitle"), `${section(L("latestSongs"))}<div id="list">${songCards(sortedSongs())}</div>`);
      bindSongCards();
    }

    function search(initial = "") {
      page(L("search"), `<input class="search" id="q" placeholder="${escapeAttr(L("searchPlaceholder"))}" value="${escapeAttr(initial)}"><div id="list"></div>`);
      const q = document.querySelector("#q");
      const list = document.querySelector("#list");
      const render = () => {
        const term = q.value.trim().toLowerCase();
        const songs = !term ? sortedSongs() : sortedSongs(store.songs.filter(song =>
          `${song.title} ${song.artist} ${song.lyrics}`.toLowerCase().includes(term)
        ));
        list.innerHTML = songCards(songs);
        bindSongCards();
      };
      q.addEventListener("input", render);
      render();
    }

    function artists() {
      const counts = store.songs.reduce((map, song) => {
        map[song.artist] = (map[song.artist] || 0) + 1;
        return map;
      }, {});
      page(L("artists"), `${section(L("allArtists"))}${Object.entries(counts).sort(([a], [b]) => a.localeCompare(b, lang(), { sensitivity: "base" })).map(([artist, count]) => `
        <article class="card" data-artist="${escapeAttr(artist)}"><h3>${escapeHtml(artist)} (${count})</h3><p>${escapeHtml(L("viewSongs"))}</p></article>
      `).join("") || `<div class="note">${escapeHtml(L("noArtist"))}</div>`}`);
      document.querySelectorAll("[data-artist]").forEach(card => {
        card.addEventListener("click", () => setView("artistSongs", card.dataset.artist));
      });
    }

    function artistSongs(artist) {
      page(artist, `${section(L("artistSongs") + " " + artist)}<div id="list">${songCards(sortedSongs(store.songs.filter(song => song.artist === artist)))}</div>`);
      bindSongCards();
    }

    function favorites() {
      const favoriteIds = store.favorites;
      const songs = sortedSongs(store.songs.filter(song => favoriteIds.includes(song.id)));
      page(L("favorites"), `${section(L("favoriteTitles"))}<div id="list">${songs.length ? songCards(songs) : `<div class="note">${escapeHtml(L("noFavorites"))}</div>`}</div>`);
      bindSongCards();
    }

    function detail(song) {
      const isFav = store.favorites.includes(song.id);
      page(L("lyrics"), `
        <div class="title-row"><h2>${escapeHtml(song.title)}</h2></div>
        <p class="note song-artist"><strong>${escapeHtml(song.artist)}</strong></p>
        <div class="actions">
          <button class="btn small" id="fav">${isFav ? escapeHtml(L("removeFav")) : escapeHtml(L("addFav"))}</button>
          <div class="align-controls">
            <button class="align-btn" data-align="left" title="${escapeAttr(L("alignLeft"))}">≡</button>
            <button class="align-btn" data-align="center" title="${escapeAttr(L("alignCenter"))}">≡</button>
            <button class="align-btn" data-align="right" title="${escapeAttr(L("alignRight"))}">≡</button>
          </div>
        </div>
        <div class="lyrics" id="lyricsBox">${escapeHtml(song.lyrics)}</div>
      `);
      app.className = "detail-screen";
      applyLyricsSize();
      applyLyricsAlign();
      zoomOut.classList.add("show");
      zoomIn.classList.add("show");
      document.querySelector("#fav").addEventListener("click", () => {
        toggleFavorite(song.id);
        setView("detail", song, false);
      });
      document.querySelectorAll("[data-align]").forEach(button => {
        button.addEventListener("click", () => {
          lyricsAlign = button.dataset.align;
          localStorage.setItem("victory_voice_lyrics_align", lyricsAlign);
          applyLyricsAlign();
        });
      });
    }

    function admin() {
      if (!adminUnlocked) return adminLogin();
      const editing = editingSongId ? store.songs.find(song => song.id === editingSongId) : null;
      page(L("admin"), `
        <form class="form" id="adminForm">
          <input class="search" id="songTitle" placeholder="${escapeAttr(L("songTitlePlaceholder"))}" value="${escapeAttr(editing?.title || "")}" required>
          <input class="search" id="artist" placeholder="${escapeAttr(L("artistPlaceholder"))}" value="${escapeAttr(editing?.artist || "")}" required>
          <textarea class="search" id="lyrics" placeholder="${escapeAttr(L("lyricsPlaceholder"))}" required>${escapeHtml(editing?.lyrics || "")}</textarea>
          <div class="actions">
            <button class="btn small">${escapeHtml(editing ? L("update") : L("save"))}</button>
            ${editing ? `<button class="btn small secondary" type="button" id="cancelEdit">${escapeHtml(L("cancel"))}</button>` : ""}
            <button class="btn small secondary" type="button" id="lockAdmin">${escapeHtml(L("lock"))}</button>
          </div>
        </form>
        <button class="btn small secondary" id="openAdminList">${escapeHtml(L("adminList"))}</button>
      `);
      document.querySelector("#adminForm").addEventListener("submit", event => {
        event.preventDefault();
        const songs = store.songs;
        const next = {
          id: editingSongId || Date.now(),
          title: document.querySelector("#songTitle").value.trim(),
          artist: document.querySelector("#artist").value.trim(),
          lyrics: document.querySelector("#lyrics").value.trim()
        };
        const index = songs.findIndex(song => song.id === editingSongId);
        if (index >= 0) songs[index] = next;
        else songs.unshift(next);
        store.songs = songs;
        editingSongId = null;
        showToast(L("songAdded"));
        admin();
      });
      document.querySelector("#cancelEdit")?.addEventListener("click", () => {
        editingSongId = null;
        admin();
      });
      document.querySelector("#lockAdmin").addEventListener("click", () => {
        adminUnlocked = false;
        editingSongId = null;
        home();
      });
      document.querySelector("#openAdminList").addEventListener("click", openAdminListModal);
    }

    function bindAdminListActions() {
      adminListBody.querySelectorAll("[data-edit]").forEach(button => {
        button.addEventListener("click", () => {
          editingSongId = Number(button.dataset.edit);
          closeAdminListModal();
          admin();
        });
      });
      adminListBody.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => {
          if (!confirm(L("deleteConfirm"))) return;
          const id = Number(button.dataset.delete);
          store.songs = store.songs.filter(song => song.id !== id);
          store.favorites = store.favorites.filter(songId => songId !== id);
          if (editingSongId === id) editingSongId = null;
          adminListBody.innerHTML = adminSongCards();
          bindAdminListActions();
        });
      });
    }

    function openAdminListModal() {
      adminListBody.innerHTML = adminSongCards();
      bindAdminListActions();
      updateStaticText();
      adminListModal.classList.add("open");
    }

    function closeAdminListModal() {
      adminListModal.classList.remove("open");
    }

    function adminLogin() {
      page(L("admin"), `
        <div class="form">
          <input class="search" id="pass" type="password" placeholder="${escapeAttr(L("passPlaceholder"))}">
          <button class="btn small" id="enterAdmin">${escapeHtml(L("enter"))}</button>
        </div>
      `);
      document.querySelector("#enterAdmin").addEventListener("click", () => {
        if (document.querySelector("#pass").value === store.password) {
          adminUnlocked = true;
          admin();
        } else {
          showToast(L("wrongPass"));
        }
      });
    }

    function settings() {
      page(L("settings"), `
        ${section(L("settings"))}
        <div class="setting-list">
          <div class="setting-row">
            <div class="setting-icon">Aa</div>
            <div class="setting-text">
              <h3>${escapeHtml(L("language"))}</h3>
              <p>${escapeHtml(L("languageSub"))}</p>
            </div>
            <div class="segmented">
              <button id="langFr">FR</button>
              <button id="langEn">EN</button>
            </div>
          </div>
          <button class="setting-row" id="securityAdmin" type="button">
            <div class="setting-icon">🔒</div>
            <div class="setting-text">
              <h3>${escapeHtml(L("adminSecurity"))}</h3>
              <p>${escapeHtml(L("adminSecuritySub"))}</p>
            </div>
          </button>
        </div>
      `);
      const language = localStorage.getItem("tononkira_language") || "fr";
      document.querySelector("#langFr").classList.toggle("active", language === "fr");
      document.querySelector("#langEn").classList.toggle("active", language === "en");
      document.querySelector("#langFr").addEventListener("click", () => setLanguage("fr"));
      document.querySelector("#langEn").addEventListener("click", () => setLanguage("en"));
      document.querySelector("#securityAdmin").addEventListener("click", openPasswordModal);
    }

    function transfer() {
      page(L("importExport"), `
        ${section(L("importExport"))}
        <div class="setting-list">
          <button class="setting-row" id="doImport" type="button">
            <div class="setting-icon">⬇</div>
            <div class="setting-text"><h3>${escapeHtml(L("importData"))}</h3><p>${escapeHtml(L("importDataSub"))}</p></div>
          </button>
          <button class="setting-row" id="doExport" type="button">
            <div class="setting-icon">⬆</div>
            <div class="setting-text"><h3>${escapeHtml(L("exportData"))}</h3><p>${escapeHtml(L("exportDataSub"))}</p></div>
          </button>
        </div>
      `);
      document.querySelector("#doExport").addEventListener("click", exportData);
      document.querySelector("#doImport").addEventListener("click", () => importFiles.click());
    }

    function about() {
      const [version, copyright] = L("aboutText").split("\\n");
      page(L("about"), `<div class="note about-note"><div>${escapeHtml(version)}</div><div>${escapeHtml(copyright)}</div></div>`);
    }

    function toggleFavorite(id) {
      const fav = store.favorites;
      store.favorites = fav.includes(id) ? fav.filter(item => item !== id) : [...fav, id];
      showToast(store.favorites.includes(id) ? L("addedFav") : L("removedFav"));
      if (document.querySelector("#list")) {
        document.querySelector("#list").innerHTML = songCards(currentVisibleSongs());
        bindSongCards();
      }
    }

    function currentVisibleSongs() {
      const q = document.querySelector("#q");
      if (!q) return sortedSongs();
      const term = q.value.trim().toLowerCase();
      return !term ? sortedSongs() : sortedSongs(store.songs.filter(song => `${song.title} ${song.artist} ${song.lyrics}`.toLowerCase().includes(term)));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timeout);
      showToast.timeout = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function openPasswordModal() {
      document.querySelector("#modalOldPass").value = "";
      document.querySelector("#modalNewPass").value = "";
      updateStaticText();
      passwordModal.classList.add("open");
    }

    function closePasswordModal() {
      passwordModal.classList.remove("open");
    }

    function changePasswordFromModal() {
      const oldPass = document.querySelector("#modalOldPass").value;
      const newPass = document.querySelector("#modalNewPass").value;
      if (oldPass !== store.password) return showToast(L("oldWrong"));
      if (newPass.trim().length < 4) return showToast(L("passShort"));
      store.password = newPass;
      adminUnlocked = false;
      closePasswordModal();
      showToast(L("passChanged"));
    }

    function exportData() {
      const data = {
        app: "Victory Voice",
        version: 1,
        settings: {
          language: localStorage.getItem("tononkira_language") || "fr",
          theme: localStorage.getItem("victory_voice_theme") || "light",
          lyricsSize,
          lyricsAlign
        },
        songs: store.songs.map(song => ({
          title: song.title,
          artist: song.artist,
          lyrics: song.lyrics,
          favorite: store.favorites.includes(song.id)
        }))
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "victory-voice-data.json";
      link.click();
      URL.revokeObjectURL(url);
      showToast(L("exportDone"));
    }

    async function importDataFiles(files) {
      let imported = 0;
      try {
        for (const file of files) {
          const data = JSON.parse(await file.text());
          const songs = Array.isArray(data.songs) ? data.songs : [];
          const existing = store.songs;
          const favorites = new Set(store.favorites);
          for (const item of songs) {
            const title = String(item.title || "").trim();
            const artist = String(item.artist || "").trim();
            const lyrics = String(item.lyrics || "").trim();
            if (!title || !artist || !lyrics) continue;
            const found = existing.find(song => song.title.toLowerCase() === title.toLowerCase() && song.artist.toLowerCase() === artist.toLowerCase());
            const id = found ? found.id : Date.now() + imported;
            if (found) {
              found.lyrics = lyrics;
            } else {
              existing.push({ id, title, artist, lyrics });
            }
            if (item.favorite) favorites.add(id);
            imported++;
          }
          store.songs = existing;
          store.favorites = [...favorites];
        }
        showToast(`${L("importDone")} ${imported}`);
        home();
      } catch (error) {
        showToast(L("transferError"));
      }
    }

    function setLanguage(language) {
      localStorage.setItem("tononkira_language", language);
      updateStaticText();
      showToast(language === "fr" ? L("languageFr") : L("languageEn"));
      setView(currentRoute.name, currentRoute.data, false);
    }

    function applyLyricsSize() {
      document.documentElement.style.setProperty("--lyrics-size", lyricsSize + "px");
      localStorage.setItem("tononkira_lyrics_size", String(lyricsSize));
    }

    function applyLyricsAlign() {
      const box = document.querySelector("#lyricsBox");
      if (box) box.style.textAlign = lyricsAlign;
      document.querySelectorAll("[data-align]").forEach(button => {
        button.classList.toggle("active", button.dataset.align === lyricsAlign);
      });
    }

    function applyTheme() {
      const dark = localStorage.getItem("victory_voice_theme") === "dark";
      document.body.classList.toggle("dark", dark);
      updateStaticText();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, "&quot;");
    }

    document.querySelector("#menuBtn").addEventListener("click", () => drawer.classList.add("open"));
    document.querySelector("#topSearch").addEventListener("click", () => setView("search"));
    document.querySelector("#themeToggle").addEventListener("click", () => {
      const next = document.body.classList.contains("dark") ? "light" : "dark";
      localStorage.setItem("victory_voice_theme", next);
      applyTheme();
    });
    document.querySelector("#modalClose").addEventListener("click", closePasswordModal);
    document.querySelector("#modalChangePass").addEventListener("click", changePasswordFromModal);
    document.querySelector("#adminListClose").addEventListener("click", closeAdminListModal);
    passwordModal.addEventListener("click", event => {
      if (event.target === passwordModal) closePasswordModal();
    });
    adminListModal.addEventListener("click", event => {
      if (event.target === adminListModal) closeAdminListModal();
    });
    importFiles.addEventListener("change", () => {
      importDataFiles([...importFiles.files]);
      importFiles.value = "";
    });
    zoomOut.addEventListener("click", () => {
      lyricsSize = Math.max(14, lyricsSize - 2);
      applyLyricsSize();
    });
    zoomIn.addEventListener("click", () => {
      lyricsSize = Math.min(34, lyricsSize + 2);
      applyLyricsSize();
    });
    drawer.addEventListener("click", event => {
      if (event.target === drawer) drawer.classList.remove("open");
    });
    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });

    window.addEventListener("popstate", event => {
      const state = event.state || { name: "home", data: null };
      currentRoute = state;
      setView(state.name, state.data, false);
    });

    history.replaceState({ name: "home", data: null }, "", "#home");
    applyLyricsSize();
    applyTheme();
    home();
  </script>
</body>
</html>
